<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>衛教題庫－變換版</title><style>
body{margin:0;background:#edf7f7;color:#17324d;font-family:"Microsoft JhengHei",sans-serif}main{max-width:820px;margin:35px auto;padding:0 18px}.box{background:#fff;padding:30px;border-radius:18px;box-shadow:0 8px 28px #1232}.tag{color:#087785;font-weight:bold}.bar{height:8px;background:#dcebed;border-radius:8px}.bar i{display:block;height:100%;background:#087785;border-radius:8px}button,select{font:inherit;padding:11px 15px;border-radius:9px;border:1px solid #a9cacc}button{cursor:pointer;background:#087785;color:#fff;font-weight:bold}button.option{width:100%;text-align:left;background:#fff;color:#17324d;margin:5px 0}button.option:hover{background:#edfafa}button.correct{background:#e6f5ec;color:#075a32;border-color:#18794e}button.wrong{background:#fff0ed;color:#8a1c13;border-color:#b42318}.hidden{display:none}#question{font-size:1.35rem;line-height:1.6;margin:15px 0}#feedback{line-height:1.6;padding:12px;margin-top:15px;border-radius:8px}.good{background:#e6f5ec}.bad{background:#fff0ed}.right{text-align:right;margin-top:18px}.review{padding:12px;margin:9px 0;background:#fff3f1;border-left:4px solid #b42318}.review.ok{background:#eff9f2;border-color:#18794e}h1{margin-top:0}</style></head><body><main><section class="box">
<div id="start"><h1>衛教流程互動練習・變換版</h1><p>題目含情境、流程、數字與反向提問，每次皆隨機抽選及排列。</p><label>題數　<select id="count"><option value="10">10 題</option><option value="20">20 題</option><option value="32">全部 32 題</option></select></label>　<button onclick="begin()">開始作答</button></div>
<div id="game" class="hidden"><div><span id="pos"></span><span style="float:right" id="now"></span></div><div class="bar"><i id="bar"></i></div><p class="tag" id="cat"></p><div id="question"></div><div id="options"></div><div id="feedback" class="hidden"></div><p class="right"><button id="next" class="hidden" onclick="advance()">下一題</button></p></div>
<div id="result" class="hidden"><h1>本次完成！</h1><h2 id="score"></h2><p id="rate"></p><button onclick="location.reload()">再測一次</button><div id="review"></div></div>
</section></main><script>
const Q=[
['發燒','疑似發燒幼兒的第一步？','先量耳溫','直接送醫','先吃藥','通知所有家長','先量耳溫，再依流程處理。'],
['發燒','耳溫達幾度通知行政區？','38°C','37°C','37.5°C','39°C','耳溫 38°C 時通知行政區。'],
['發燒','發燒幼兒耳溫每隔多久再量？','10 分鐘','5 分鐘','20 分鐘','30 分鐘','應每隔 10 分鐘再量一次。'],
['發燒','第二次兩耳皆達 38°C 的處置？','保健室隔離','留班休息','先冰敷','繼續戶外活動','兩耳皆達 38°C，帶至保健室隔離。'],
['發燒','下列何者不是發燒照顧重點？','強迫進食','觀察精神活動力','補充水分','提供休息','不應強迫進食。'],
['危機事件','發生意外事故危機事件的首要原則？','確認幼兒安全並呼叫支援','先寫紀錄','先通知家長','先找監視器','先確保幼兒安全並呼叫支援。'],
['危機事件','無心跳、無呼吸時？','CPR','復甦姿勢','喝水','拍照紀錄','無心跳、無呼吸時進行 CPR。'],
['危機事件','有呼吸心跳但無意識時？','復甦姿勢','跑步活動','坐姿等待','進食','採復甦姿勢並保持呼吸道暢通。'],
['危機事件','意外事故視情況通報的電話？','119','110','113','165','視情況通知 119。'],
['危機事件','幼兒嗆到且無法呼吸，初步處理？','協助排出異物','讓他喝水','只叫家長','讓他平躺','噎到時協助排出異物。'],
['嘔吐腹瀉','清理前要戴什麼？','手套與口罩','帽子鞋套','只戴手套','不用防護','應戴手套與口罩。'],
['嘔吐腹瀉','嘔吐物污染使用的漂白水濃度？','5000 ppm','100 ppm','1000 ppm','10000 ppm','嘔吐物、血液、排泄物污染用 5000 ppm。'],
['嘔吐腹瀉','噴灑 5000 ppm 後靜置多久？','1–2 分鐘','立即擦','30 秒','10 分鐘','靜置 1–2 分鐘。'],
['嘔吐腹瀉','汙染物清潔的擦拭方向？','由外向內','由內向外','由上向下','任意方向','由外向內擦拭。'],
['嘔吐腹瀉','腹瀉要額外觀察？','排便次數及性質','視力','身高','牙齒','觀察排便次數及性質，並補水防脫水。'],
['腸病毒','手足口紅疹未入托，家長應？','帶回就診','照常入托','只量體溫','先消毒玩具','未入托者請家長帶回就診。'],
['腸病毒','環境、桌面、玩具消毒濃度？','1000 ppm','500 ppm','5000 ppm','不用消毒','一般環境及玩具消毒用 1000 ppm。'],
['腸病毒','醫師診斷後，何時通報？','疑似症狀即通報','退燒才通報','一週後通報','不用通報','含疑似症狀即通報。'],
['腸病毒','腸病毒幼兒停托多久？','7 天','3 天','5 天','14 天','依題目規定停托 7 天。'],
['腸病毒','下列何者是重症前兆？','持續嘔吐','食欲正常','精神好','正常午睡','持續嘔吐是重症前兆，須提高警覺。'],
['漂白水','1000 ppm 的比例？','1：50','1：10','1：100','1：1000','1000 ppm 比例為 1：50。'],
['漂白水','1000 ppm 適當用途？','一般環境與玩具','嘔吐物污染','手部消毒','直接飲用','一般環境、桌面和玩具消毒。'],
['漂白水','調製時的正確作法？','每天現泡','一週泡一次','不必標示','幼兒可自行拿取','漂白水應每天現泡。'],
['漂白水','容器必須標示？','名稱、濃度、調製日期','只有名稱','只有顏色','不用標示','容器要標示名稱、濃度及調製日期。'],
['用藥','餵藥前先做什麼？','開好平板、點開幼兒並洗手','先簽名','直接拿藥','先叫家長','先開平板點選幼兒，洗手後進行餵藥。'],
['用藥','五對不包含？','體重','人','藥','時間','五對為人、藥、時間、劑量、途徑。'],
['用藥','餵藥後需要？','清洗藥杯並簽名','把藥杯留桌上','不用紀錄','只叫幼兒回座','餵藥後要整理環境並簽名。'],
['換尿布','尿布丟棄後下一步？','手部酒精清潔再包乾淨尿布','立刻叫下一位','離開尿布台','只擦手','手部酒精清潔後包上乾淨尿布。'],
['換尿布','幼兒離開後，尿布檯？','消毒清潔','不處理','只噴香水','下班再擦','幼兒離開後進行尿布檯消毒清潔。'],
['洗手','洗手口訣？','內、外、夾、弓、大、立、腕','搓、沖、捧、擦','前後左右','濕搓沖擦','口訣為內、外、夾、弓、大、立、腕。'],
['洗手','洗手至少多久？','30 秒','10 秒','15 秒','60 秒','洗手至少需 30 秒。'],
['洗手','何者是洗手時機？','摸鼻涕後','只早上入園','只午睡後','只放學前','接觸體液（如摸鼻涕）後要洗手。']
];
let quiz=[],i=0,right=0,log=[],locked=false;const sh=a=>[...a].sort(()=>Math.random()-.5);function begin(){quiz=sh(Q).slice(0,+count.value);start.className='hidden';game.className='';draw()}function draw(){locked=false;let q=quiz[i],choices=sh(q.slice(2,6).map((x,n)=>[x,n]));pos.textContent=`第 ${i+1} / ${quiz.length} 題`;now.textContent=`答對 ${right} 題`;bar.style.width=`${i/quiz.length*100}%`;cat.textContent=q[0];question.textContent=q[1];options.innerHTML='';feedback.className='hidden';next.className='hidden';choices.forEach(([x,n])=>{let b=document.createElement('button');b.className='option';b.textContent=x;b.onclick=()=>answer(n,b);options.append(b)})}function answer(n,b){if(locked)return;locked=true;let q=quiz[i],ok=n===0;if(ok)right++;log.push([q,n,ok]);[...options.children].forEach(x=>{x.disabled=true;if(x.textContent===q[2])x.classList.add('correct')});if(!ok)b.classList.add('wrong');feedback.className=ok?'good':'bad';feedback.innerHTML=(ok?'答對！':'答錯了。')+' <b>正確答案：'+q[2]+'</b><br>'+q[6];next.textContent=i===quiz.length-1?'查看成績':'下一題';next.className='';now.textContent=`答對 ${right} 題`}function advance(){if(++i<quiz.length)draw();else done()}function done(){game.className='hidden';result.className='';score.textContent=`${right} / ${quiz.length}`;rate.textContent=`答對率：${Math.round(right/quiz.length*100)}%`;review.innerHTML='<h3>作答紀錄</h3>'+log.map((x,n)=>`<div class="review ${x[2]?'ok':''}"><b>${n+1}. ${x[0][1]}</b><br>${x[2]?'✓ 答對':'✗ 你的答案：'+x[0][x[1]+2]+'；正確：'+x[0][2]}<br>${x[0][6]}</div>`).join('')}</script></body></html>
